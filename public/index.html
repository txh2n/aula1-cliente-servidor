<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Funcionarios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Sistema de Cadastro de Funcionários</h1>
        <button onclick="logout()">Sair</button>
    </header>
    <main>
        <section class="formulario">
    <h2>Cadastrar Funcionário</h2>
    <form id="formFuncionario">
        <input type="text" id="nome" placeholder="Nome">
        <input type="text" id="cargo" placeholder="Cargo">
        <input type="number" id="salario" placeholder="Salário">
        <input type="text" id="setor" placeholder="Setor">
        <button type="submit">Cadastrar</button>
    </form>
</section>
<section class="lista">
    <h2>Funcionários Cadastrados</h2>
    <ul id="listaFuncionarios"></ul>
</section>
<script src="script.js"></script>
    </main>
</body>
</html>
